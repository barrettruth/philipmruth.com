name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: pnpm install

      - name: Format
        run: just format

      - name: Lint
        run: just lint

      - name: Build
        run: just build
