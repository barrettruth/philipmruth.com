name: Feature Request
description: Suggest an improvement for philipmruth.com
title: 'feat: '
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description:
        What problem does this feature solve? What are you trying to do?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like to see.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about?
